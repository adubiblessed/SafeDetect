<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SafeDetect{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(34, 211, 238, 0.12), transparent 32%),
                linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100">
    <header class="border-b border-white/10 bg-slate-950/70 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <a href="{% url 'detection:dashboard' %}" class="text-lg font-black tracking-tight text-white">
                SafeDetect
            </a>
            <nav class="flex items-center gap-3 text-sm">
                {% if user.is_authenticated %}
                    <a href="{% url 'detection:dashboard' %}" class="rounded-full px-4 py-2 text-slate-300 hover:bg-white/5 hover:text-white">Dashboard</a>
                    <a href="{% url 'accounts:profile' %}" class="rounded-full px-4 py-2 text-slate-300 hover:bg-white/5 hover:text-white">Profile</a>
                    <a href="{% url 'accounts:upload_profile_picture' %}" class="rounded-full bg-cyan-400 px-4 py-2 font-semibold text-slate-950 hover:bg-cyan-300">Add Photo</a>
                    <form method="post" action="{% url 'accounts:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="rounded-full px-4 py-2 text-slate-300 hover:bg-white/5 hover:text-white">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="rounded-full px-4 py-2 text-slate-300 hover:bg-white/5 hover:text-white">Login</a>
                    <a href="{% url 'accounts:register' %}" class="rounded-full bg-cyan-400 px-4 py-2 font-semibold text-slate-950 hover:bg-cyan-300">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    {% if messages %}
        <div class="mx-auto max-w-7xl px-4 pt-4 sm:px-6 lg:px-8">
            {% for message in messages %}
                <div class="mb-3 rounded-2xl border px-4 py-3 text-sm {% if message.tags == 'error' %}border-rose-400/30 bg-rose-500/10 text-rose-200{% else %}border-emerald-400/30 bg-emerald-500/10 text-emerald-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
